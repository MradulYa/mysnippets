   var a=parseInt(prompt("enter value of a :"))

   var temp;

   a=b;
   b=temp;
   document.write("value of a after swapping is:" +a);
   document.write("<br>");
   document.write("value of b after swapping is:" + b);
   document.write("<br>");
   var sum=a+b;
   document.write("value of sum is:" + b);

</script>
